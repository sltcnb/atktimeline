services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atktimeline
      POSTGRES_USER: atktimeline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "atktimeline"]
      interval: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://atktimeline:${POSTGRES_PASSWORD}@db:5432/atktimeline
      SECRET_KEY: ${SECRET_KEY}
      # Local dev is served over plain HTTP; allow the session cookie without TLS.
      # Remove or set to 1 when serving over HTTPS.
      SESSION_COOKIE_SECURE: "0"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask init-db && gunicorn --bind 0.0.0.0:8000 --workers 2 app:app"

volumes:
  postgres_data:
