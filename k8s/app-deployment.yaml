apiVersion: apps/v1
kind: Deployment
metadata:
  name: atktimeline
  namespace: atktimeline
  labels:
    app: atktimeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atktimeline
  template:
    metadata:
      labels:
        app: atktimeline
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done']
        - name: db-init
          image: atktimeline:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-c", """
import os
os.environ.setdefault('FLASK_APP', 'app')
from app import app, db
with app.app_context():
    db.create_all()
    print('Database tables created.')
"""]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SECRET_KEY
      containers:
        - name: atktimeline
          image: atktimeline:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SECRET_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /login
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /login
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
